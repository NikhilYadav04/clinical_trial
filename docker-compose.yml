services:

  backend:
    build: .
    env_file: .env
    ports:
      - "8005:8005"
    volumes:
      # Persist user data (auth + bookmarks + history etc.) across restarts
      - ./api/data:/app/api/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
